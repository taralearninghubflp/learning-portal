<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARA Learning Portal</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial,sans-serif;
color:#fff;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
}

.video{
margin-top:25px;
}

button{

width:100%;
padding:18px;

font-size:18px;

border:none;

border-radius:10px;

background:#2563eb;

color:#fff;

cursor:pointer;

margin-top:25px;

transition:.3s;

}

button:disabled{

background:#555;

cursor:not-allowed;

}

#timer{

margin-top:20px;

text-align:center;

font-size:22px;

font-weight:bold;

color:#22c55e;

display:none;

}

#status{

margin-top:10px;

text-align:center;

font-size:16px;

}

</style>

</head>

<body>

<div class="container">

<h1>TARA Learning Portal</h1>

<p align="center">

Complete today's learning video to unlock the quiz.

</p>

<div class="video">

<div style="position:relative;padding-top:56.25%;">

<iframe

src="https://player.mediadelivery.net/embed/682161/6a55dbaf-0e06-4fc9-a869-a86e4318088e?autoplay=true&loop=false&muted=true&preload=true&responsive=true"

loading="lazy"

style="border:0;position:absolute;top:0;height:100%;width:100%;"

allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;fullscreen;"

allowfullscreen>

</iframe>

</div>

</div>

<button id="quizBtn" disabled>

🔒 Complete Video To Unlock Quiz

</button>

<div id="timer"></div>

<div id="status"></div>

</div>

<script>

const quizBtn=document.getElementById("quizBtn");
const timer=document.getElementById("timer");
const status=document.getElementById("status");

let unlockSeconds=120;
let countdown;

setTimeout(function(){

quizBtn.disabled=false;

quizBtn.innerHTML="✅ Continue To Quiz";

status.innerHTML="Quiz unlocked for 2 minutes.";

timer.style.display="block";

startCountdown();

},60000);


function startCountdown(){

updateTimer();

countdown=setInterval(function(){

unlockSeconds--;

updateTimer();

if(unlockSeconds<=0){

clearInterval(countdown);

quizBtn.disabled=true;

quizBtn.innerHTML="🔒 Quiz Locked";

timer.innerHTML="⏰ Quiz Expired";

status.innerHTML="Please watch the complete video again.";

}

},1000);

}

function updateTimer(){

let m=Math.floor(unlockSeconds/60);

let s=unlockSeconds%60;

timer.innerHTML="Quiz Time Remaining : "+m+":"+(s<10?"0":"")+s;

}

quizBtn.onclick=function(){

if(quizBtn.disabled)return;

window.location.href="quiz.html";

}

</script>

</body>
</html>
